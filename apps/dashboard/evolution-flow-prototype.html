<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EvoPilot Dashboard 流程原型</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --panel: #ffffff;
        --ink: #1f2733;
        --muted: #657180;
        --line: #dce2e8;
        --accent: #177d8d;
        --side: #121c23;
        --good: #17825b;
        --warn: #b7791f;
        --bad: #b42318;
        --blue: #2f6fbd;
      }

      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--ink); font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .app { display: flex; min-height: 100vh; }
      .side { width: 248px; background: var(--side); color: #fff; padding: 24px 14px; }
      .brand { display: flex; gap: 12px; align-items: center; padding: 0 8px 22px; border-bottom: 1px solid rgba(255,255,255,.12); }
      .mark { width: 38px; height: 38px; border-radius: 8px; background: var(--accent); display: grid; place-items: center; font-weight: 800; }
      .brand strong { display: block; }
      .brand span { display: block; color: #aab6c2; font-size: 12px; margin-top: 2px; }
      .nav { display: grid; gap: 4px; margin-top: 18px; }
      .nav a { height: 45px; border-radius: 6px; display: flex; align-items: center; padding: 0 10px; color: #d8e1e8; font-weight: 700; font-size: 15px; text-decoration: none; }
      .nav a.active { background: #26323c; color: #fff; }
      .main { flex: 1; }
      .top { height: 104px; border-bottom: 1px solid var(--line); background: #f7f9fb; display: flex; align-items: center; padding: 0 28px; }
      .eyebrow { font-size: 12px; font-weight: 800; color: #667386; margin: 0 0 8px; }
      .top h1 { font-size: 30px; margin: 0; }
      .content { padding: 28px; }
      .flow { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 16px; }
      .flow .step { height: 68px; background: #fff; border: 1px solid var(--line); border-radius: 6px; display: grid; grid-template-columns: 30px 1fr; gap: 8px; align-items: center; padding: 10px; }
      .flow .n { grid-row: span 2; width: 28px; height: 28px; border-radius: 50%; background: #e9eff4; color: #6e7b89; display: grid; place-items: center; font-weight: 800; }
      .flow b { font-size: 15px; }
      .flow span:last-child { color: #6b7684; font-size: 12px; }
      .flow .on { border-color: var(--accent); background: #eef9fb; }
      .flow .on .n { background: var(--accent); color: #fff; }
      .card { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 16px; }
      .title { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 12px; }
      .title h2 { font-size: 18px; margin: 0 0 6px; }
      .title p { margin: 0; color: #667386; line-height: 1.55; }
      .btn { border: 1px solid var(--line); background: #fff; border-radius: 6px; padding: 10px 14px; font-weight: 800; color: var(--ink); }
      .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      .pill { display: inline-flex; align-items: center; border-radius: 999px; padding: 4px 9px; font-size: 12px; font-weight: 800; background: #edf1f5; color: #4f5b68; white-space: nowrap; }
      .pill.good { background: #e6f5ee; color: var(--good); }
      .pill.warn { background: #fff3d9; color: var(--warn); }
      .pill.bad { background: #fdeceb; color: var(--bad); }
      .pill.blue { background: #e8f1ff; color: #2d67b7; }
      .toolbar { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 12px; }
      .filters { display: flex; gap: 8px; flex-wrap: wrap; }
      .chip { border: 1px solid var(--line); background: #f8fafc; border-radius: 999px; padding: 7px 10px; font-size: 12px; font-weight: 800; color: #5d6876; }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th { text-align: left; font-size: 12px; color: #697587; padding: 10px 8px; background: #f3f6f9; border-bottom: 1px solid var(--line); }
      td { padding: 12px 8px; border-bottom: 1px solid #e8edf2; color: #29323d; vertical-align: top; }
      .sub { display: block; margin-top: 4px; color: #71808f; font-size: 12px; }
      .check { width: 18px; height: 18px; accent-color: var(--accent); }
      tr.selected { background: #f0fbfd; }
      .disabled { opacity: .55; }
      .bottomBar { position: sticky; bottom: 0; margin-top: 14px; border: 1px solid #b8dbe2; background: #eef9fb; border-radius: 8px; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; }
      .grid2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
      .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
      .metric { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 14px; }
      .metric span { color: #657180; font-size: 12px; }
      .metric b { display: block; font-size: 26px; margin-top: 7px; }
      .rulebox { border: 1px solid var(--line); border-radius: 8px; padding: 14px; background: #fbfcfd; display: grid; gap: 10px; }
      .prompt { border: 1px solid #b8dbe2; background: #eef9fb; border-radius: 6px; padding: 12px; font-weight: 800; }
      .codebox { background: #11171c; color: #d5dce3; border-radius: 7px; padding: 12px; font: 12px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-wrap; }
      .abs { position: relative; min-height: 760px; }
      .modalBack { position: absolute; inset: 0; background: rgba(18,28,35,.45); display: grid; place-items: center; }
      .modal { width: 720px; background: #fff; border-radius: 8px; border: 1px solid var(--line); box-shadow: 0 30px 90px rgba(0,0,0,.28); padding: 18px; }
      .form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
      .field { display: grid; gap: 6px; color: #657180; font-size: 13px; }
      .input { height: 38px; border: 1px solid var(--line); border-radius: 6px; padding: 0 10px; background: #fff; color: #1f2733; }
      .wide { grid-column: 1 / -1; }
      .textarea { height: 92px; padding: 10px; font: 14px/1.55 inherit; border: 1px solid var(--line); border-radius: 6px; resize: none; }
      .modalActions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 14px; }
      .oppRow { display: grid; grid-template-columns: 1.35fr .68fr 1fr .75fr 1fr .65fr auto; gap: 12px; align-items: center; border-bottom: 1px solid #e8edf2; padding: 13px 4px; }
      .oppHead { font-size: 12px; color: #697587; background: #f3f6f9; padding: 10px 4px; }
      .tags { display: flex; gap: 6px; flex-wrap: wrap; }
      .tag { background: #edf1f5; border-radius: 999px; padding: 4px 8px; font-size: 12px; font-weight: 800; color: #4f5b68; }
      .editor { border: 1px solid #2b3642; border-radius: 7px; background: #10171d; color: #dce7ef; overflow: hidden; min-height: 720px; }
      .editorTop { height: 46px; background: #18212a; border-bottom: 1px solid #2b3642; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; color: #9fb0be; font-size: 12px; }
      .editorTop b { color: #fff; font-size: 14px; }
      .code { display: grid; grid-template-columns: 54px 1fr; font: 14px/1.78 ui-monospace, SFMono-Regular, Menlo, monospace; }
      .ln { background: #121a21; color: #63717e; text-align: right; padding: 16px 12px; user-select: none; }
      .md { white-space: pre-wrap; padding: 16px; color: #dce7ef; margin: 0; }
      .editorActions { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #2b3642; background: #151e26; padding: 12px 14px; }
      .editorActions span { color: #8d9aa7; font-size: 12px; }
      .rowactions { display: flex; gap: 8px; flex-wrap: wrap; }
      .pipeline { display: grid; grid-template-columns: 280px minmax(0,1fr); gap: 16px; }
      .leftPanel { display: grid; gap: 12px; align-content: start; }
      .execflow { border: 1px solid var(--line); border-radius: 6px; background: #f8fafc; padding: 12px; display: grid; gap: 9px; }
      .execstep { display: grid; grid-template-columns: 12px 1fr auto; gap: 8px; align-items: center; font-size: 12px; }
      .execstep i { width: 9px; height: 9px; border-radius: 50%; background: #9aa7b5; }
      .execstep.ok i { background: var(--good); }
      .execstep.run i { background: var(--blue); }
      .stream { background: #10171d; border: 1px solid #25313a; border-radius: 8px; min-height: 585px; color: #d5dce3; overflow: hidden; }
      .streamHead { height: 48px; background: #18212a; border-bottom: 1px solid #25313a; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; }
      .streamHead h2 { color: #fff; margin: 0; font-size: 16px; }
      .streamHead span { color: #8fa0ad; font-size: 12px; }
      .messages { padding: 16px; display: grid; gap: 14px; }
      .msg { display: grid; grid-template-columns: 34px 1fr; gap: 10px; align-items: start; }
      .avatar { width: 30px; height: 30px; border-radius: 6px; background: #24313c; color: #9fb0be; display: grid; place-items: center; font-weight: 800; font-size: 12px; }
      .bubble { border: 1px solid #2a343e; border-radius: 7px; background: #151d24; padding: 11px 12px; }
      .bubble.agent { background: transparent; border-color: transparent; padding: 4px 0; }
      .meta { display: flex; gap: 8px; align-items: center; color: #7f8b96; font-size: 12px; margin-bottom: 6px; }
      .meta b { color: #f4f7fb; font-size: 13px; }
      .bubble p { margin: 0; color: #d5dce3; font-size: 13px; line-height: 1.65; }
      .toolbox { margin-top: 8px; border-radius: 6px; background: #20272e; padding: 9px 10px; color: #9fb0be; font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace; }
      .diff { margin-top: 8px; border-radius: 6px; background: #0d1116; color: #c9d1d9; padding: 10px; font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-wrap; }
      .typing { display: inline-block; width: 7px; height: 14px; background: #72c7d4; margin-left: 4px; vertical-align: -2px; }
      .stageGrid { display: grid; grid-template-columns: 150px repeat(5,1fr); border: 1px solid var(--line); border-radius: 7px; overflow: hidden; margin-top: 16px; }
      .cell { min-height: 66px; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 10px; text-align: center; background: #fff; }
      .cell.head { background: #f3f6f9; font-weight: 800; }
      .cell.ok { background: #dcf8df; }
      .cell.run { background: #e8f1ff; }
      .cell.wait { background: #f5f7f9; color: #778391; }
      .list { display: grid; gap: 8px; }
      .mini { border: 1px solid var(--line); border-radius: 6px; padding: 10px; background: #fafbfc; }
      .mini b { display: block; margin-bottom: 4px; }
      .mini span { font-size: 12px; color: #667386; }
      .historyGrid { display: grid; grid-template-columns: 1.2fr .8fr .7fr 1.4fr .8fr; gap: 12px; }
      .historyGrid > div { background: #fff; border: 1px solid var(--line); border-radius: 7px; padding: 13px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const steps = ["接入项目", "证据策略", "评测集", "机会点", "流水线", "历史记录"];
      const stepDesc = ["线上证据接入", "采样/评估策略", "选择样本回归集", "生成进化建议", "升级和验证", "效果沉淀"];
      const pages = {
        projects: ["接入项目", "接入项目", projects],
        register: ["接入项目", "注册项目", register],
        rules: ["证据策略", "证据策略", rules],
        newRule: ["证据策略", "新增策略", newRule],
        datasets: ["评测集", "评测集", datasets],
        compose: ["评测集", "形成机会点", compose],
        opportunities: ["机会点", "机会点", opportunities],
        opportunityEvidence: ["机会点", "关联评测集", opportunityEvidence],
        editor: ["机会点", "编辑进化方案", editor],
        confirmEvolution: ["机会点", "确认进化", confirmEvolution],
        upgrade: ["流水线", "流水线", upgrade],
        upgradeFailed: ["流水线", "代码升级失败", upgradeFailed],
        cicd: ["流水线", "CI/CD 阶段视图", cicd],
        history: ["历史记录", "历史记录", history],
        historyDetail: ["历史记录", "历史详情", historyDetail]
      };

      function render() {
        const key = location.hash.replace("#", "") || "projects";
        const [active, title, bodyFactory] = pages[key] || pages.projects;
        const body = bodyFactory();
        document.querySelector("#root").innerHTML = shell(active, title, body);
      }

      function shell(active, title, body) {
        return `<div class="app">
          <aside class="side">
            <div class="brand"><div class="mark">EP</div><div><strong>EvoPilot</strong><span>Agent 持续进化平台</span></div></div>
            <nav class="nav">${steps.map((step) => `<a class="${step === active ? "active" : ""}" href="#${pageFor(step)}">${step}</a>`).join("")}</nav>
          </aside>
          <main class="main">
            <header class="top"><div><p class="eyebrow">AI AGENT 线上证据驱动进化</p><h1>${title}</h1></div></header>
            <section class="content">
              <div class="flow">${steps.map((step, index) => `<div class="step ${step === active ? "on" : ""}"><span class="n">${index + 1}</span><b>${step}</b><span>${stepDesc[index]}</span></div>`).join("")}</div>
              ${body}
            </section>
          </main>
        </div>`;
      }

      function pageFor(step) {
        return ({ 接入项目: "projects", 证据策略: "rules", 评测集: "datasets", 机会点: "opportunities", 流水线: "upgrade", 历史记录: "history" })[step];
      }

      function table(headers, rows) {
        return `<table><thead><tr>${headers.map((header) => `<th>${header}</th>`).join("")}</tr></thead><tbody>${rows.map((row) => `<tr>${row.map((cell) => `<td>${cell}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
      }

      function projects() {
        return `<div class="metrics"><div class="metric"><span>已接入项目</span><b>2</b></div><div class="metric"><span>验证通过</span><b>1</b></div><div class="metric"><span>正在收集</span><b>1</b></div><div class="metric"><span>最近证据</span><b>3.6s</b></div></div>
        <section class="card"><div class="title"><div><h2>项目注册与验证</h2><p>只有 Git URL、凭据和仓库验证通过的项目，才能进入证据策略、评测集、机会点和流水线。</p></div><a class="btn primary" href="#register">注册项目</a></div>
        ${table(["项目", "状态", "仓库", "凭据", "验证", "最近信号"], [
          ["<b>DomainForge Fabric</b><span class='sub'>domainforge-fabric</span>", "<span class='pill good'>健康</span>", "https://git.example.com/domainforge-fabric.git", "已配置 Token", "<span class='pill good'>已验证</span>", "MCP 链路 p95 3.6s"],
          ["<b>Simple Agent Project</b><span class='sub'>simple-agent-project</span>", "<span class='pill warn'>正在收集</span>", "https://git.example.com/simple-agent.git", "待补充", "<span class='pill warn'>待验证</span>", "工具失败率上升"]
        ])}</section>`;
      }

      function register() {
        return `<div class="abs">${projects()}<div class="modalBack"><section class="modal"><div class="title"><div><h2>注册项目</h2><p>填写 Git 仓库、用户名、密码或 Token。验证通过后项目才进入下游流程。</p></div><span class="pill warn">验证通过才可用</span></div>
        <div class="form">
          <label class="field"><span>项目 ID</span><input class="input" value="agent-prod"></label>
          <label class="field"><span>项目名称</span><input class="input" value="Agent Product"></label>
          <label class="field"><span>接入方式</span><input class="input" value="GitLab"></label>
          <label class="field"><span>默认分支</span><input class="input" value="main"></label>
          <label class="field wide"><span>Git URL</span><input class="input" value="https://gitlab.example.com/group/agent.git"></label>
          <label class="field"><span>用户名</span><input class="input" value="agent-user"></label>
          <label class="field"><span>Token 环境变量</span><input class="input" value="GITLAB_TOKEN"></label>
        </div><div class="modalActions"><a class="btn" href="#projects">取消</a><button class="btn primary">验证并注册</button></div></section></div></div>`;
      }

      function rules() {
        return `<div class="grid2"><section class="card"><div class="title"><div><h2>用户可见策略</h2><p>用户用简单 Prompt 定义策略，系统再编译成可执行规则。</p></div><a class="btn primary" href="#newRule">新增策略</a></div>
        <div class="rulebox"><span class="pill good">domainforge-fabric</span><div class="prompt">所有链路调用小于 3 秒</div><span class="sub">触发后进入采样、聚类、评估，形成评测集。</span></div><br>
        <div class="rulebox"><span class="pill warn">simple-agent-project</span><div class="prompt">工具连续失败时需要恢复设计</div><span class="sub">当前仍在采样和标注，暂不允许直接形成机会点。</span></div></section>
        <section class="card"><div class="title"><div><h2>系统执行规则</h2><p>管理员可查看 Markdown 存储的详细规则。</p></div><span class="pill blue">rules/*.md</span></div><div class="codebox"># chain-latency-over-3s

用户规则：所有链路调用小于 3 秒

执行条件：
- event.source in [trace, mcp, agent]
- attributes.durationMs > 3000

输出：
- 采样到评测集
- 进入回归套件
- 可与其他评测集合并形成机会点</div></section></div>`;
      }

      function newRule() {
        return `<div class="abs">${rules()}<div class="modalBack"><section class="modal"><div class="title"><div><h2>新增策略</h2><p>用户输入简单规则，系统生成可审查的 Markdown 执行规则。</p></div><span class="pill blue">Prompt 到规则</span></div>
        <div class="form"><label class="field"><span>项目</span><input class="input" value="domainforge-fabric"></label><label class="field"><span>策略类型</span><input class="input" value="性能优化"></label><label class="field wide"><span>用户规则 Prompt</span><input class="input" value="所有链路调用小于 3 秒"></label><label class="field wide"><span>生成后的规则摘要</span><textarea class="textarea">当链路耗时超过 3000ms 时，采样进入评测集；可与 RAG、成本、用户反馈评测集合并形成机会点。</textarea></label></div>
        <div class="modalActions"><a class="btn" href="#rules">取消</a><button class="btn primary">生成并保存 Markdown 规则</button></div></section></div></div>`;
      }

      function datasetRows() {
        const rows = [
          ["checked", "高延迟链路问答", "domainforge-fabric", "Trace 聚类", "可回归", "高", "428", "p95 3.6s", "MCP Trace / 订单问答链路"],
          ["", "工具失败恢复", "simple-agent-project", "Tool Call", "待标注", "中", "96", "失败率 8.4%", "Tool Call / 恢复路径"],
          ["checked", "RAG 引用漂移", "domainforge-fabric", "RAG Context", "可回归", "中", "171", "命中率下降 6.2%", "RAG Context / 知识引用"],
          ["checked", "成本与延迟异常", "domainforge-fabric", "Cost / Latency", "已评估", "中", "142", "成本 +12%", "LLM 调用 / 路由策略"],
          ["", "用户负反馈聚类", "simple-agent-project", "用户反馈", "证据不足", "低", "18", "负反馈 18 条", "用户反馈 / 多轮对话"]
        ];
        return `<table><thead><tr><th></th><th>评测集</th><th>项目</th><th>来源</th><th>状态</th><th>严重度</th><th>样本</th><th>关键指标</th><th>影响范围</th><th>最近触发</th></tr></thead><tbody>${rows.map((row, index) => `<tr class="${row[0] ? "selected" : ""} ${["待标注", "证据不足"].includes(row[4]) ? "disabled" : ""}"><td><input class="check" type="checkbox" ${row[0]} ${["待标注", "证据不足"].includes(row[4]) ? "disabled" : ""}></td><td><b>${row[1]}</b><span class="sub">${row[0] ? "已选入机会点草案" : "当前不可直接形成机会点"}</span></td><td>${row[2]}</td><td>${row[3]}</td><td><span class="pill ${row[4] === "可回归" || row[4] === "已评估" ? "good" : row[4] === "待标注" ? "warn" : "bad"}">${row[4]}</span></td><td><span class="pill ${row[5] === "高" ? "bad" : row[5] === "中" ? "warn" : ""}">${row[5]}</span></td><td>${row[6]}</td><td>${row[7]}</td><td>${row[8]}</td><td>2026-06-03 09:${28 + index * 6}</td></tr>`).join("")}</tbody></table>`;
      }

      function datasets() {
